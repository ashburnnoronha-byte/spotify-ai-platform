# Render Blueprint — Docker cloud deploy of Spotify AI platform.
# Railway trial was expired / required billing; Fly required billing.
# Free Render plan only allows web services (not private services).
services:
  - type: web
    name: spotify-ai-web
    runtime: docker
    plan: free
    region: singapore
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: BACKEND_UPSTREAM
        value: spotify-ai-api:10000

  - type: web
    name: spotify-ai-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/auth/status
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spotify-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spotify-ai-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        value: https://spotify-ai-api.onrender.com/api/v1/auth/callback
      - key: FRONTEND_URL
        value: https://spotify-ai-web.onrender.com
      - key: CORS_ORIGINS
        value: '["https://spotify-ai-web.onrender.com"]'
      - key: LLM_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_OPENAI_EMBEDDINGS
        value: "false"
      - key: CHROMA_PERSIST_DIR
        value: /app/.chroma
      - key: DEBUG
        value: "false"

  - type: keyvalue
    name: spotify-ai-redis
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: spotify-ai-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    ipAllowList: []
    databaseName: spotify_ai
